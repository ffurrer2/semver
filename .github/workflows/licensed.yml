# SPDX-License-Identifier: MIT
name: Licensed

on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/licensed.yml
    - .licensed.yml
    - .licenses/**
    - go.mod
    - go.sum

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=licensed packageName=licensee/licensed versioning=semver
  LICENSED_VERSION: '5.0.6'

jobs:
  licensed:
    name: Check licenses
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: './go.mod'

    - name: Download dependencies
      run: |
        go mod download -x

    - name: Setup Ruby
      uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
      with:
        ruby-version: ruby

    - name: Setup Licensed
      uses: licensee/setup-licensed@0d52e575b3258417672be0dff2f115d7db8771d8 # v1.3.2
      env:
        GOFLAGS: -mod=vendor
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        version: ${{ env.LICENSED_VERSION }}

    - name: Check Licenses
      run: |
        licensed status
