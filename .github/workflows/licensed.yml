# SPDX-License-Identifier: MIT
name: Licensed

on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/licensed.yml
    - .licensed.yml
    - .licenses/**
    - go.mod
    - go.sum

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=licensed packageName=licensee/licensed versioning=semver
  LICENSED_VERSION: '5.1.0'

jobs:
  licensed:
    name: Check licenses
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: './go.mod'

    - name: Download dependencies
      run: |
        go mod download -x

    - name: Setup Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
      with:
        ruby-version: ruby

    - name: Setup Licensed
      uses: licensee/setup-licensed@0d52e575b3258417672be0dff2f115d7db8771d8 # v1.3.2
      env:
        GOFLAGS: -mod=vendor
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        version: ${{ env.LICENSED_VERSION }}

    - name: Check Licenses
      run: |
        licensed status
